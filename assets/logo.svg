<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 128" width="470" height="128" role="img" aria-label="bootstrapper-og">
  <title>bootstrapper-og</title>
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon: a query vector finding its nearest neighbours inside a search radius -->
  <rect x="16" y="16" width="96" height="96" rx="24" fill="url(#badge)"/>

  <!-- search radius around the query -->
  <circle cx="64" cy="68" r="33" fill="none" stroke="#ffffff" stroke-opacity="0.35"
          stroke-width="2" stroke-dasharray="3 6"/>

  <!-- edges from the query to its 3 retrieved neighbours -->
  <g stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round">
    <line x1="64" y1="68" x2="40" y2="44"/>
    <line x1="64" y1="68" x2="89" y2="49"/>
    <line x1="64" y1="68" x2="83" y2="91"/>
  </g>

  <!-- non-retrieved points -->
  <g fill="#ffffff" fill-opacity="0.5">
    <circle cx="64" cy="33" r="4"/>
    <circle cx="99" cy="74" r="4"/>
    <circle cx="43" cy="93" r="4"/>
  </g>

  <!-- retrieved neighbours -->
  <g fill="#22d3ee">
    <circle cx="40" cy="44" r="5.5"/>
    <circle cx="89" cy="49" r="5.5"/>
    <circle cx="83" cy="91" r="5.5"/>
  </g>

  <!-- the query vector -->
  <circle cx="64" cy="68" r="8.5" fill="#f59e0b" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Wordmark -->
  <text x="132" y="64" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" fill="url(#word)">bootstrapper<tspan fill="#f59e0b">-og</tspan></text>
  <text x="134" y="92" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15" font-weight="500" letter-spacing="0.2" fill="#64748b">an open lab for ANN retrieval &amp; the theory behind it</text>
</svg>
